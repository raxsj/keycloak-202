
services:
  angular-app:
    image: node:latest
    command:
      - sh
      - -c
      - |
        npm install && npm run start
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ../apps/angular-app_/:/app   
  #   # depends_on:
  #   #   - keycloak
  api-node:
    image: node:latest
    command:
      - sh
      - -c
      - |
        npm install && npm start
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../apps/api-node_/:/app   
    # depends_on:
    #   - keycloak  
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command:
      - start-dev
      - --hostname-strict=false
      - --proxy-headers=xforwarded
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - keycloak